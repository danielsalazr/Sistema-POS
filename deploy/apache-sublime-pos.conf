<VirtualHost *:80>
    ServerName _
    DocumentRoot /home/daniel/Desktop/POS/frontend/dist

    <Directory /home/daniel/Desktop/POS/frontend/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:3001/api/
    ProxyPassReverse /api/ http://127.0.0.1:3001/api/

    ErrorLog ${APACHE_LOG_DIR}/dela-pos-error.log
    CustomLog ${APACHE_LOG_DIR}/dela-pos-access.log combined
</VirtualHost>
